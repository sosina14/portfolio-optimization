name: Unit Tests
on:
  push:
    branches: [ main, task-1, task-2, task-3, task-4, task-5 ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - run: pip install pandas numpy pytest yfinance
    - run: pytest tests/ -v
